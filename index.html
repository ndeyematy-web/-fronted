        if(next.length===1) unlockAchievement('first_analysis',{icon:'🔬',title:'Première analyse !',desc:'Vous avez lancé votre 1ère détection IA.',xp:100});
        if(next.length===5) unlockAchievement('five_analyses',{icon:'🏅',title:'5 analyses effectuées',desc:'Vous commencez à maîtriser PlantAI !',xp:200});
        if(next.length===10) unlockAchievement('ten_analyses',{icon:'⭐',title:'Analyste expert',desc:'10 analyses réalisées. Impressionnant !',xp:500});
        return next;
      });
      if (data.niveau==="critical") { setAlertModal(data); setAlertBar(data); }
      else if (data.niveau==="sick") { showToast(`⚠️ Plante infectée : ${data.maladie} (${data.score}%)`,"error"); }
      else {
        showToast(`✅ Plante saine — Confiance : ${data.score}%`,"success");
        fireConfetti();
        unlockAchievement('first_healthy',{icon:'🌿',title:'Plante saine détectée !',desc:'Votre plante est en parfaite santé.',xp:50});
      }
    } catch(err) {
      // Fallback mock si le backend est inaccessible
      console.warn("Backend inaccessible, utilisation du mode démo :", err.message);
      await new Promise(r=>setTimeout(r,1400));
      const data = MOCK[Math.floor(Math.random()*MOCK.length)];
      setResult(data); setHistory(p=>[{id:Date.now(),image:fileName,...data,date:new Date(),source:"mock"},...p]);
      if (data.niveau==="critical") { setAlertModal(data); setAlertBar(data); }
      else if (data.niveau==="sick") { showToast(`⚠️ [Démo] ${data.maladie} (${data.score}%)`,"error"); }
      else {
        showToast(`✅ [Démo] Plante saine — ${data.score}%`,"success");
        fireConfetti();
        unlockAchievement('first_healthy',{icon:'🌿',title:'Plante saine détectée !',desc:'Aucune maladie détectée.',xp:50});
      }
    } finally { setLoading(false); }
  };

  /* Banner props */
  const healthColor = result ? (result.niveau==="healthy"?"green":result.niveau==="sick"?"orange":"red") : "green";
  const healthIcon  = result ? (result.niveau==="healthy"?"✅":result.niveau==="sick"?"⚠️":"🚨") : "⏳";
  const healthLabel = result ? result.maladie : "En attente…";
  const healthSub   = loading ? "Analyse en cours — modèle CNN" : result ? `Analysé · Confiance : ${result.score}%` : "Soumettez une image pour démarrer";

  const TABS = [{id:"dashboard",label:"📊 Dashboard"},{id:"analyse",label:"🔍 Analyser"},{id:"history",label:"🗂️ Historique"},{id:"stats",label:"📈 Statistiques"}];

  /* ── Mobile menu ── */
  const [menuOpen, setMenuOpen] = useState(false);
  const [cmdOpen,  setCmdOpen]  = useState(false);
  const [achievement, setAchievement] = useState(null);
  const achievedRef = useRef(new Set());
  const fireConfetti = triggerConfetti;
  const ticker = useTicker(result);
  useScrollReveal(page);

  /* Ctrl+K command palette */
  useEffect(function(){
    var handler=function(e){
      if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();setCmdOpen(function(o){return!o;});}
      if(e.key==='Escape')setCmdOpen(false);
    };
    window.addEventListener('keydown',handler);
    return function(){window.removeEventListener('keydown',handler);};
  },[]);

  /* Achievement trigger */
  var unlockAchievement = function(id, data) {
    if(achievedRef.current.has(id))return;
    achievedRef.current.add(id);
    setAchievement(data);
    setTimeout(function(){setAchievement(null);},5000);
  };

  /* Ambient glow color based on health */
  var ambientColor = result
    ? (result.niveau==='healthy'?'rgba(29,185,84,0.15)':result.niveau==='critical'?'rgba(239,68,68,0.15)':'rgba(245,158,11,0.12)')
    : 'rgba(29,185,84,0.08)';


  /* ── Profil ── */
  const [profileOpen, setProfileOpen] = useState(false);
  const userName   = userEmail ? userEmail.split("@")[0].replace(/[._]/g," ").replace(/\b\w/g,c=>c.toUpperCase()) : "Étudiant";
  const userInitials = userName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const loginTime  = useRef(new Date());

  /* ── Export PDF ── */
  const [pdfLoading, setPdfLoading] = useState(false);
  const [toast, setToast]           = useState(null);
  const [alertModal, setAlertModal] = useState(null);
  const [alertBar,   setAlertBar]   = useState(null);
  const alertCount = history.filter(h=>h.niveau==="critical").length;

  // Annotations
  const [noteModal,  setNoteModal]  = useState(null);   // {id, maladie, date, note}
  const [noteDraft,  setNoteDraft]  = useState("");

  const openNote = (h) => { setNoteModal(h); setNoteDraft(h.note||""); };
  const saveNote = () => {
    setHistory(p => p.map(h => h.id===noteModal.id ? {...h, note: noteDraft.trim()} : h));
    showToast("📝 Note enregistrée !");
    setNoteModal(null);
  };
  const deleteNote = () => {
    setHistory(p => p.map(h => h.id===noteModal.id ? {...h, note:""} : h));
    showToast("🗑 Note supprimée");
    setNoteModal(null);
  };

  const showToast = (msg, type="success") => {
    setToast({msg, type});
    setTimeout(() => setToast(null), 3500);
  };

  const exportPDF = () => {
    const { jsPDF } = window.jspdf;
    if (!jsPDF) { showToast("jsPDF non disponible", "error"); return; }
    setPdfLoading(true);
    try {
      const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
      const W = doc.internal.pageSize.getWidth();
      let y = 0;

      /* ── En-tête vert ── */
      doc.setFillColor(29, 185, 84);
      doc.rect(0, 0, W, 38, "F");
      doc.setFillColor(13, 110, 46);
      doc.rect(0, 32, W, 6, "F");

      doc.setTextColor(255, 255, 255);
      doc.setFontSize(20); doc.setFont("helvetica","bold");
      doc.text("🌿 PlantAI — Student Plant Monitor", 14, 16);
      doc.setFontSize(9); doc.setFont("helvetica","normal");
      doc.text("Rapport de détection des maladies des plantes · Projet Tutoré 2026", 14, 24);
      doc.text(`Généré le : ${new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"})}`, 14, 31);
      y = 50;

      /* ── Section KPI ── */
      doc.setTextColor(15, 23, 42);
      doc.setFontSize(12); doc.setFont("helvetica","bold");
      doc.text("Résumé des Analyses", 14, y); y += 8;

      const kpis = [
        {label:"Total Analyses", val:String(total),   color:[29,185,84]},
        {label:"Plantes Saines", val:String(healthy),  color:[22,163,74]},
        {label:"Infectées",      val:String(sick),     color:[245,158,11]},
        {label:"Critiques",      val:String(critical), color:[239,68,68]},
      ];
      const bw = (W - 28 - 9) / 4;
      kpis.forEach((k, i) => {
        const x = 14 + i*(bw+3);
        doc.setFillColor(...k.color);
        doc.roundedRect(x, y, bw, 20, 3, 3, "F");
        doc.setTextColor(255,255,255);
        doc.setFontSize(18); doc.setFont("helvetica","bold");
        doc.text(k.val, x + bw/2, y+13, {align:"center"});
        doc.setFontSize(7); doc.setFont("helvetica","normal");
        doc.text(k.label, x + bw/2, y+19, {align:"center"});
      });
      y += 30;

      /* ── Capteurs ── */
      doc.setTextColor(15, 23, 42);
      doc.setFontSize(12); doc.setFont("helvetica","bold");
      doc.text("État des Capteurs ESP32 (Valeurs actuelles)", 14, y); y += 8;

      const sensorData = [
        ["🌡️ Température", `${sensors.temp} °C`,     sensors.temp < 18?"Froid":sensors.temp>32?"Chaud":"Normal"],
        ["💧 Humidité air",  `${sensors.humidity} %`, sensors.humidity<40?"Sec":sensors.humidity>80?"Saturé":"Normal"],
        ["🌱 Humidité sol",  `${sensors.soil} %`,     sensors.soil<40?"Sec":sensors.soil>75?"Saturé":"Normal"],
        ["☀️ Luminosité",    `${sensors.light} %`,    sensors.light<30?"Sombre":sensors.light>85?"Fort":"Normal"],
      ];
      doc.autoTable({
        startY: y,
        head: [["Capteur","Valeur","Statut"]],
        body: sensorData,
        theme: "grid",
        headStyles: { fillColor:[29,185,84], textColor:255, fontStyle:"bold", fontSize:9 },
        bodyStyles: { fontSize:9, textColor:[15,23,42] },
        alternateRowStyles: { fillColor:[232,248,237] },
        margin: { left:14, right:14 },
        tableWidth: W - 28,
      });
      y = doc.lastAutoTable.finalY + 12;

      /* ── Dernier diagnostic ── */
      if (result) {
        doc.setFontSize(12); doc.setFont("helvetica","bold"); doc.setTextColor(15,23,42);
        doc.text("Dernier Diagnostic IA", 14, y); y += 8;
        const statusColor = result.niveau==="healthy"?[29,185,84]:result.niveau==="sick"?[245,158,11]:[239,68,68];
        doc.setFillColor(...statusColor);
        doc.roundedRect(14, y, W-28, 18, 3, 3, "F");
        doc.setTextColor(255,255,255);
        doc.setFontSize(13); doc.setFont("helvetica","bold");
        doc.text(result.maladie, 20, y+8);
        doc.setFontSize(9); doc.setFont("helvetica","normal");
        doc.text(`Confiance : ${result.score}%  ·  Statut : ${result.niveau==="healthy"?"Saine":result.niveau==="sick"?"Infectée":"Critique"}`, 20, y+15);
        y += 26;
        if (result.conseil) {
          doc.setTextColor(13,110,46); doc.setFontSize(9); doc.setFont("helvetica","italic");
          doc.text(`💡 ${result.conseil}`, 14, y, {maxWidth: W-28}); y += 14;
        }
      }

      /* ── Historique ── */
      if (history.length > 0) {
        doc.setFontSize(12); doc.setFont("helvetica","bold"); doc.setTextColor(15,23,42);
        doc.text("Historique des Analyses", 14, y); y += 6;
        doc.autoTable({
          startY: y,
          head: [["#","Image","Maladie détectée","Confiance","Statut","Date","Note"]],
          body: history.map((h,i) => [
            String(history.length-i),
            h.image||"image.jpg",
            h.maladie,
            `${h.score}%`,
            h.niveau==="healthy"?"✓ Saine":h.niveau==="sick"?"⚠ Infectée":"✕ Critique",
            h.date.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}),
            h.note||"—",
          ]),
          theme: "striped",
          headStyles: { fillColor:[15,23,42], textColor:255, fontStyle:"bold", fontSize:8 },
          bodyStyles: { fontSize:8 },
          alternateRowStyles: { fillColor:[247,249,252] },
          margin: { left:14, right:14 },
          tableWidth: W-28,
          didParseCell: (data) => {
            if (data.section==="body" && data.column.index===4) {
              const v = data.cell.raw;
              if (v.includes("Saine"))    data.cell.styles.textColor = [22,163,74];
              if (v.includes("Infectée")) data.cell.styles.textColor = [217,119,6];
              if (v.includes("Critique")) data.cell.styles.textColor = [220,38,38];
            }
          }
        });
      }

      /* ── Pied de page ── */
      const pages = doc.internal.getNumberOfPages();
      for (let i=1; i<=pages; i++) {
        doc.setPage(i);
        doc.setFontSize(8); doc.setTextColor(148,163,184); doc.setFont("helvetica","normal");
        doc.text(`PlantAI · Projet Tutoré 2026 · Page ${i}/${pages}`, W/2, doc.internal.pageSize.getHeight()-8, {align:"center"});
        doc.setDrawColor(229,231,235); doc.line(14, doc.internal.pageSize.getHeight()-12, W-14, doc.internal.pageSize.getHeight()-12);
      }

      doc.save(`PlantAI_Rapport_${new Date().toLocaleDateString("fr-FR").replace(/\//g,"-")}.pdf`);
      showToast("✅ Rapport PDF téléchargé !");
    } catch(e) {
      showToast("❌ Erreur lors de la génération du PDF", "error");
    } finally {
      setPdfLoading(false);
    }
  };

  /* Splash screen au démarrage */
  if (showSplash) return <SplashScreen onDone={()=>setShowSplash(false)}/>;

  /* Page de connexion */
  if (!isLoggedIn) return <LoginPage onLogin={(email)=>{ setUserEmail(email); setIsLoggedIn(true); }}/>;

  return (<div className="dashboard-enter">
    {/* ═══ GLOBAL EFFECTS ═══ */}
    <CursorTrail/>
    {/* Ambient glow */}
    <div className="ambient-glow g1" style={{background:ambientColor}}/>
    <div className="ambient-glow g2" style={{background:ambientColor,opacity:0.6}}/>
    {/* Command Palette */}
    {cmdOpen && <CommandPalette
      onClose={function(){setCmdOpen(false);}}
      onNavigate={function(p){setPage(p);}}
      history={history}
      darkMode={darkMode}
      onToggleDark={function(){setDarkMode(function(d){return!d;});}}
    />}
    {/* Achievement Toast */}
    {achievement && <AchievementToast data={achievement} onDone={function(){setAchievement(null);}}/>}

    {/* ══ NAVBAR ══ */}
    <nav className="navbar">
      <div className="nav-brand">
        <div className="nav-logo">🌿</div>
        <div>
          <div className="nav-title">Student Plant Monitor</div>
          <div className="nav-subtitle">Détection intelligente des maladies</div>
        </div>
      </div>
      {/* Hamburger mobile */}
      <button className={`nav-hamburger ${menuOpen?"open":""}`} onClick={()=>setMenuOpen(p=>!p)} aria-label="Menu">
        <span/><span/><span/>
      </button>

      <div className="nav-sep"/>
      <div className="nav-tabs">
        {TABS.map(t=>(
          <button key={t.id} className={`nav-tab ${page===t.id?"active":""}`} onClick={()=>setPage(t.id)}>{t.label}</button>
        ))}
      </div>
      <div className="nav-badge"><span className="pulse-dot"/>ESP32-CAM — Online</div>
      <div className="live-ticker">
        <span className="ticker-dot"/>
        <span key={ticker.tick} className="ticker-text">{ticker.msg}</span>
      </div>

      {/* Badge alertes critiques */}
      {alertCount > 0 && (
        <div className="nav-badge" style={{background:"rgba(239,68,68,0.12)",borderColor:"#fca5a5",color:"#dc2626",cursor:"pointer"}}
          onClick={()=>setPage("history")}>
          🚨 Alertes <span className="alert-badge">{alertCount}</span>
        </div>
      )}

      <button className="btn-pdf" onClick={function(){setCmdOpen(true);}} style={{background:"linear-gradient(135deg,#3b82f6,#1d4ed8)",boxShadow:"0 2px 8px rgba(59,130,246,0.3)"}}>
        ⌕ Commandes <span style={{opacity:0.7,fontSize:"0.65rem",marginLeft:"2px"}}>Ctrl+K</span>
      </button>
      <button className="btn-pdf" onClick={exportPDF} disabled={pdfLoading}>
        {pdfLoading ? "⏳ Génération..." : "📄 Exporter PDF"}
      </button>
      <div className="nav-time">{fmtTime(now)}</div>

      {/* Bouton dark mode */}
      <button className="btn-theme" onClick={()=>setDarkMode(p=>!p)} title={darkMode?"Mode clair":"Mode sombre"}>
        {darkMode ? "☀️" : "🌙"}
      </button>

      {/* ── Profil utilisateur ── */}
      <div className="nav-profile">
        <button className="nav-profile-btn" onClick={()=>setProfileOpen(p=>!p)}>
          <div className="nav-avatar">{userInitials}</div>
          <div style={{textAlign:"left"}}>
            <div className="nav-profile-name">{userName}</div>
            <div className="nav-profile-role">Étudiant IoT</div>
          </div>
          <span className={`nav-chevron ${profileOpen?"open":""}`}>▼</span>
        </button>

        {profileOpen && (
          <div className="profile-dropdown">
            {/* En-tête vert */}
            <div className="pd-header">
              <div className="pd-avatar-lg">{userInitials}</div>
              <div>
                <div className="pd-name">{userName}</div>
                <div className="pd-email">{userEmail}</div>
                <span className="pd-role-badge">🎓 Projet Tutoré 2026</span>
              </div>
            </div>

            {/* Stats rapides */}
            <div className="pd-stats">
              <div>
                <div className="pd-stat-val">{total}</div>
                <div className="pd-stat-label">Analyses</div>
              </div>
              <div>
                <div className="pd-stat-val" style={{color:"#1db954"}}>{healthy}</div>
                <div className="pd-stat-label">Saines</div>
              </div>
              <div>
                <div className="pd-stat-val" style={{color:"#ef4444"}}>{critical}</div>
                <div className="pd-stat-label">Critiques</div>
              </div>
            </div>

            <div className="pd-body">
              <div className="pd-item" onClick={()=>{ setProfileOpen(false); setPage("dashboard"); }}>
                <span className="pd-item-icon">📊</span> Dashboard
              </div>
              <div className="pd-item" onClick={()=>{ setProfileOpen(false); setPage("history"); }}>
                <span className="pd-item-icon">🗂️</span> Historique des analyses
              </div>
              <div className="pd-item" onClick={()=>{ setDarkMode(p=>!p); setProfileOpen(false); }}>
                <span className="pd-item-icon">{darkMode?"☀️":"🌙"}</span>
                {darkMode ? "Mode clair" : "Mode sombre"}
              </div>
              <div className="pd-sep"/>
              <div className="pd-item" style={{fontSize:"0.75rem",color:"var(--text3)",cursor:"default",pointerEvents:"none"}}>
                <span className="pd-item-icon">⏱️</span>
                Connecté depuis {Math.round((new Date()-loginTime.current)/60000)||"<1"} min
              </div>
              <div className="pd-sep"/>
              <div className="pd-item danger" onClick={()=>{ setProfileOpen(false); setIsLoggedIn(false); setUserEmail(""); }}>
                <span className="pd-item-icon">🚪</span> Se déconnecter
              </div>
            </div>
          </div>
        )}
      </div>
    </nav>

    {/* ═══ KEYBOARD HINT BAR ═══ */}
    <div className="kb-bar">
      <span><kbd>Ctrl</kbd>+<kbd>K</kbd> Palette de commandes</span>
      <span className="kb-bar-sep">·</span>
      <span><kbd>Ctrl</kbd>+<kbd>D</kbd> Dark mode</span>
      <span className="kb-bar-sep">·</span>
      <span><kbd>Ctrl</kbd>+<kbd>P</kbd> Exporter PDF</span>
      <span style={{marginLeft:"auto",color:"var(--green-dark)",fontWeight:700}}>PlantAI v2.0 · ESP32-CAM · YOLOv8 · Flask</span>
    </div>

    {/* ══ MENU MOBILE ══ */}
    <div className={`mobile-menu ${menuOpen?"open":""}`}>
      {TABS.map(t=>(
        <button key={t.id} className={`mobile-tab ${page===t.id?"active":""}`}
          onClick={()=>{ setPage(t.id); setMenuOpen(false); }}>
          {t.label}
        </button>
      ))}
      <div className="mobile-menu-sep"/>
      <div className="mobile-menu-row">
        <button className="mobile-tab" onClick={()=>{ setDarkMode(p=>!p); setMenuOpen(false); }}>
          {darkMode?"☀️ Mode clair":"🌙 Mode sombre"}
        </button>
        <button className="mobile-tab" style={{color:"#dc2626"}}
          onClick={()=>{ setMenuOpen(false); exportPDF(); }}>
          📄 PDF
        </button>
      </div>
      <div className="mobile-menu-sep"/>
      <button className="mobile-tab" style={{color:"#dc2626"}}
        onClick={()=>{ setMenuOpen(false); setIsLoggedIn(false); setUserEmail(""); }}>
        🚪 Se déconnecter
      </button>
    </div>

    {/* Barre d'alerte sticky */}
    {alertBar && (
      <div className="alert-bar">
        <span>🚨</span>
        <strong>ALERTE CRITIQUE</strong> — {alertBar.maladie} détectée avec {alertBar.score}% de confiance. Action immédiate requise !
        <button className="alert-bar-close" onClick={()=>setAlertBar(null)}>✕ Fermer</button>
      </div>
    )}

    {/* Modal alerte critique */}
    {alertModal && (
      <div className="alert-overlay" onClick={()=>setAlertModal(null)}>
        <div className="alert-modal" onClick={e=>e.stopPropagation()}>
          <div className={`alert-header ${alertModal.niveau}`}>
            <div className="alert-icon-wrap">🚨</div>
            <div className="alert-header-text">
              <h3>ALERTE — Maladie Critique Détectée !</h3>
              <p>Le modèle IA a identifié une pathologie sévère nécessitant une intervention immédiate.</p>
            </div>
          </div>
          <div className="alert-body">
            <div className="alert-disease">
              {alertModal.maladie}
            </div>
            <div className="alert-conf">
              Confiance du modèle :
              <div className="alert-conf-bar">
                <div className="alert-conf-fill" style={{width:`${alertModal.score}%`, background:"#ef4444"}}/>
              </div>
              <strong style={{color:"#ef4444"}}>{alertModal.score}%</strong>
            </div>
            {alertModal.conseil && (
              <div className={`alert-conseil ${alertModal.niveau}`}>
                ⚠️ <strong>Action recommandée :</strong> {alertModal.conseil}
              </div>
            )}
            <div className="alert-actions">
              <button className="alert-btn-dismiss" onClick={()=>setAlertModal(null)}>
                Ignorer
              </button>
              <button className="alert-btn-view" onClick={()=>{setAlertModal(null);setPage("history");}}>
                📋 Voir l'historique
              </button>
            </div>
          </div>
        </div>
      </div>
    )}

    {/* Modal annotation */}
    {noteModal && (
      <div className="note-modal-overlay" onClick={()=>setNoteModal(null)}>
        <div className="note-modal" onClick={e=>e.stopPropagation()}>
          <div className="note-modal-head">
            <div>
              <div className="note-modal-title">📝 Annoter l'analyse</div>
              <div className="note-modal-sub">Ajoute une note personnelle sur ce résultat</div>
            </div>
            <button className="note-modal-close" onClick={()=>setNoteModal(null)}>✕</button>
          </div>
          <div className="note-modal-body">
            <div className="note-disease-info">
              <span className="note-disease-icon">
                {noteModal.niveau==="healthy"?"✅":noteModal.niveau==="sick"?"⚠️":"🚨"}
              </span>
              <div>
                <div className="note-disease-name">{noteModal.maladie}</div>
                <div className="note-disease-date">{fmtFull(noteModal.date)} · Confiance : {noteModal.score}%</div>
              </div>
            </div>
            <textarea
              className="note-textarea"
              placeholder="Ex : Feuille prélevée dans la parcelle B3 — traitement au cuivre appliqué le lendemain..."
              value={noteDraft}
              onChange={e=>setNoteDraft(e.target.value.slice(0,300))}
              autoFocus
            />
            <div className="note-char-count">{noteDraft.length} / 300 caractères</div>
            <div className="note-actions">
              {noteModal.note && (
                <button className="note-btn-cancel" style={{color:"#dc2626",borderColor:"#fca5a5"}} onClick={deleteNote}>
                  🗑 Supprimer
                </button>
              )}
              <button className="note-btn-cancel" onClick={()=>setNoteModal(null)}>Annuler</button>
              <button className="note-btn-save" onClick={saveNote} disabled={!noteDraft.trim()}>
                💾 Enregistrer
              </button>
            </div>
          </div>
        </div>

              <div className="cc-sub" style={{marginBottom:"8px"}}>Saine / Infectée / Critique</div>
              {total === 0
                ? <div className="empty-box"><div className="e-icon">🔬</div><p>Aucune donnée</p></div>
                : <div style={{height:"190px"}}><Donut
                    data={[healthy, sick, critical].filter((_,i)=>[healthy,sick,critical][i]>0)}
                    labels={["Saines","Infectées","Critiques"].filter((_,i)=>[healthy,sick,critical][i]>0)}
                    colors={["#1db954","#f59e0b","#ef4444"].filter((_,i)=>[healthy,sick,critical][i]>0)}
                  /></div>
              }
            </div>

            {/* Stats capteurs */}
            <div className="chart-card">
              <div className="cc-title" style={{marginBottom:"2px"}}>📡 État actuel ESP32</div>
              <div className="cc-sub" style={{marginBottom:"14px"}}>Valeurs capteurs en temps réel</div>
              {[
                {label:"Température",  val:`${sensors.temp}°C`,  pct:Math.round((sensors.temp-10)/30*100), color:"#f59e0b", icon:"🌡️",
                  status: sensors.temp<18?"Froid":sensors.temp>32?"Chaud":"Optimal"},
                {label:"Humidité air", val:`${sensors.humidity}%`, pct:sensors.humidity, color:"#3b82f6", icon:"💧",
                  status: sensors.humidity<40?"Sec":sensors.humidity>80?"Saturé":"Optimal"},
                {label:"Humidité sol", val:`${sensors.soil}%`, pct:sensors.soil, color:"#1db954", icon:"🌱",
                  status: sensors.soil<40?"Sec":sensors.soil>75?"Saturé":"Optimal"},
                {label:"Luminosité",   val:`${sensors.light}%`,  pct:sensors.light, color:"#eab308", icon:"☀️",
                  status: sensors.light<30?"Sombre":sensors.light>85?"Fort":"Optimal"},
              ].map(s=>(
                <div className="sensor-row" key={s.label}>
                  <div className="sensor-head">
                    <span className="sensor-name">{s.icon} {s.label}</span>
                    <span className="sensor-val" style={{color:s.color}}>{s.val}</span>
                  </div>
                  <div className="sensor-bar">
                    <div className="sensor-fill" style={{width:`${Math.min(100,s.pct)}%`, background:s.color}}/>
                  </div>
                  <div style={{fontSize:"0.65rem",color:s.status==="Optimal"?"#1db954":"#f59e0b",fontWeight:700,marginTop:"3px"}}>
                    {s.status==="Optimal"?"✓ Optimal":"⚠ "+s.status}
                  </div>
                </div>
              ))}
              <div style={{marginTop:"12px",fontSize:"0.72rem",color:"var(--text3)",borderTop:"1px solid var(--border)",paddingTop:"10px"}}>
                Confiance moy. IA : <strong style={{color:"var(--green)"}}>{avgConf2}%</strong>
                {lastAnalysis && <span> · Dernier : <strong style={{color:"var(--text)"}}>{lastAnalysis.maladie}</strong></span>}
              </div>
            </div>
          </div>
        </>);
      })()}

    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
