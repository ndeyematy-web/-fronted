<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PlantAI — Student Plant Monitor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    :root {
      --green:      #1db954;
      --green-dark: #159a42;
      --green-deep: #0d6e2e;
      --green-pale: #e8f8ed;
      --green-mid:  #d1f2dc;
      --bg:         #f7f9fc;
      --white:      #ffffff;
      --border:     #e2e8f0;
      --border2:    #cbd5e1;
      --text:       #0f172a;
      --text2:      #475569;
      --text3:      #94a3b8;
      --orange:     #f59e0b;
      --red:        #ef4444;
      --blue:       #3b82f6;
      --shadow-sm:  0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow:     0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg:  0 12px 40px rgba(0,0,0,0.12);
      --shadow-green: 0 8px 32px rgba(29,185,84,0.22);
    }

    /* ══════════ MODE SOMBRE ══════════ */
    body.dark {
      --bg:         #0f1117;
      --white:      #1a1d27;
      --border:     #2a2d3a;
      --border2:    #3a3d4a;
      --text:       #f1f5f9;
      --text2:      #94a3b8;
      --text3:      #475569;
      --green-pale: #0d2e1a;
      --green-mid:  #0a2015;
      --shadow-sm:  0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
      --shadow:     0 4px 16px rgba(0,0,0,0.4);
      --shadow-lg:  0 12px 40px rgba(0,0,0,0.5);
    }
    body.dark ::-webkit-scrollbar-track { background: #1a1d27; }
    body.dark ::-webkit-scrollbar-thumb { background: #2a2d3a; }

    /* Bouton dark mode toggle */
    .btn-theme {
      width: 38px; height: 38px; border-radius: 10px;
      border: 1.5px solid var(--border); background: var(--white);
      color: var(--text2); font-size: 1.05rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .btn-theme:hover { background: var(--green-pale); border-color: var(--green); transform: rotate(15deg) scale(1.05); }

    /* Transition douce sur tout le body */
    body { transition: background 0.3s, color 0.3s; }
    .navbar, .chart-card, .metric-card, .hero-banner, .upload-zone,
    .alert-modal, .note-modal, .result-card, .rc-body, .login-right,
    .login-input, .note-textarea {
      transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    /* ══════════ TOP NAVBAR ══════════ */
    .navbar {
      background: var(--white);
      border-bottom: 1.5px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: var(--shadow-sm);
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 2px 8px rgba(29,185,84,0.35);
    }
    .nav-title {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .nav-subtitle { font-size: 0.65rem; color: var(--text3); margin-top: 1px; }

    .nav-sep { flex: 1; }

    .nav-tabs { display: flex; gap: 2px; }
    .nav-tab {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text2);
      transition: all 0.18s;
      border: none;
      background: none;
    }
    .nav-tab:hover  { background: var(--green-pale); color: var(--green-dark); }
    .nav-tab.active { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #fff; box-shadow: 0 2px 10px rgba(29,185,84,0.3); }

    .nav-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--green-pale);
      border: 1.5px solid #a7f3c3;
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--green-dark);
      margin-left: 8px;
    }
    .pulse-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(29,185,84,0.4); }
      50%      { box-shadow: 0 0 0 5px rgba(29,185,84,0); }
    }

    .nav-time {
      font-size: 0.72rem;
      color: var(--text3);
      font-weight: 500;
      margin-left: 4px;
    }

    .btn-pdf {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 8px;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      color: #fff; border: none; cursor: pointer;
      font-size: 0.78rem; font-weight: 700;
      transition: all 0.2s; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(239,68,68,0.3);
    }
    .btn-pdf:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(239,68,68,0.4); }
    .btn-pdf:active { transform: translateY(0); }
    .btn-pdf:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Toast notification */
    .toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      background: var(--text); color: #fff;
      padding: 12px 20px; border-radius: 12px;
      font-size: 0.82rem; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      animation: slideUp 0.3s ease;
    }
    .toast.success { background: #16a34a; }
    .toast.error   { background: #dc2626; }
    @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

    /* ── Alerte critique ── */
    .alert-overlay {
      position: fixed; inset: 0; z-index: 10000;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .alert-modal {
      background: #fff; border-radius: 20px; padding: 0;
      width: 420px; max-width: 92vw; overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }

    .alert-header {
      padding: 22px 24px 18px;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .alert-header.critical { background: linear-gradient(135deg,#ef4444,#b91c1c); }
    .alert-header.sick     { background: linear-gradient(135deg,#f59e0b,#d97706); }

    .alert-icon-wrap {
      width: 52px; height: 52px; border-radius: 14px;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; flex-shrink: 0;
      animation: shake 0.5s ease 0.3s;
    }
    @keyframes shake {
      0%,100%{transform:rotate(0)} 20%{transform:rotate(-8deg)} 40%{transform:rotate(8deg)}
      60%{transform:rotate(-5deg)} 80%{transform:rotate(5deg)}
    }
    .alert-header-text h3 { font-size: 1.1rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .alert-header-text p  { font-size: 0.8rem; color: rgba(255,255,255,0.8); line-height: 1.4; }

    .alert-body { padding: 20px 24px; }
    .alert-disease {
      font-size: 1.3rem; font-weight: 900; color: #0f172a;
      margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
    }
    .alert-conf {
      font-size: 0.82rem; color: #64748b; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .alert-conf-bar { flex:1; height: 6px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
    .alert-conf-fill { height: 100%; border-radius: 10px; transition: width 0.8s; }
    .alert-conseil {
      background: #fef9c3; border-left: 3px solid #f59e0b;
      border-radius: 0 8px 8px 0; padding: 10px 14px;
      font-size: 0.8rem; color: #78350f; line-height: 1.5; margin-bottom: 18px;
    }
    .alert-conseil.critical { background: #fee2e2; border-color: #ef4444; color: #7f1d1d; }

    .alert-actions { display: flex; gap: 10px; }
    .alert-btn-dismiss {
      flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid #e2e8f0;
      background: #fff; color: #475569; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.18s;
    }
    .alert-btn-dismiss:hover { background: #f8fafc; border-color: #cbd5e1; }
    .alert-btn-view {
      flex: 1; padding: 10px; border-radius: 10px; border: none;
      background: linear-gradient(135deg,#1db954,#16a34a);
      color: #fff; font-size: 0.85rem; font-weight: 700;
      cursor: pointer; transition: all 0.18s;
      box-shadow: 0 2px 8px rgba(29,185,84,0.3);
    }
    .alert-btn-view:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(29,185,84,0.4); }

    /* Badge alerte navbar */
    .alert-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 50%;
      background: #ef4444; color: #fff;
      font-size: 0.65rem; font-weight: 800;
      margin-left: 6px; animation: pulse 1.5s infinite;
    }

    /* Barre d'alerte sticky */
    .alert-bar {
      background: linear-gradient(135deg,#ef4444,#b91c1c);
      color: #fff; padding: 9px 28px;
      display: flex; align-items: center; gap: 10px;
      font-size: 0.82rem; font-weight: 600;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown { from{opacity:0;transform:translateY(-100%)} to{opacity:1;transform:translateY(0)} }
    .alert-bar-close {
      margin-left: auto; background: rgba(255,255,255,0.2); border: none;
      color: #fff; border-radius: 6px; padding: 2px 8px; cursor: pointer;
      font-size: 0.78rem; font-weight: 700;
    }

    /* ══════════ LAYOUT ══════════ */
    .page { max-width: 1400px; margin: 0 auto; padding: 28px 32px; }

    /* ══════════ HERO SECTION — Image style ══════════ */
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    /* Grande bannière verte — Plant Health */
    .hero-banner {
      border-radius: 18px;
      padding: 28px 30px;
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .hero-banner:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    /* Quand hero-banner est dans un TiltCard, le tilt gère tout */
    .tilt-wrap .hero-banner { transition: none; }
    .tilt-wrap .hero-banner:hover { transform: none; box-shadow: none; }
    .hero-banner.green  { background: linear-gradient(135deg, #1db954, #0d6e2e); box-shadow: var(--shadow-green); }
    .hero-banner.teal   { background: linear-gradient(135deg, #0ea5e9, #0369a1); box-shadow: 0 8px 32px rgba(14,165,233,0.22); }
    .hero-banner.orange { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 8px 32px rgba(245,158,11,0.22); }
    .hero-banner.red    { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 8px 32px rgba(239,68,68,0.22); }

    .hb-bg-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }
    .hb-bg-circle.c1 { width: 160px; height: 160px; top: -50px; right: -40px; }
    .hb-bg-circle.c2 { width: 90px;  height: 90px;  bottom: -25px; right: 60px; }

    .hb-label {
      font-size: 0.7rem;
      font-weight: 800;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      letter-spacing: 1.8px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hb-value {
      font-size: 2.1rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .hb-sub {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }
    .hb-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      margin-top: 12px;
    }
    .hb-conf {
      position: absolute;
      top: 24px;
      right: 28px;
      text-align: right;
    }
    .hb-conf-val   { font-size: 2.6rem; font-weight: 900; color: #fff; line-height: 1; }
    .hb-conf-label { font-size: 0.7rem; color: rgba(255,255,255,0.65); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

    /* ══════════ SMALL METRICS ROW ══════════ */
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .metric-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
      cursor: default;
    }
    .metric-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
    .metric-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .metric-val   { font-size: 1.5rem; font-weight: 900; line-height: 1; }
    .metric-label { font-size: 0.72rem; color: var(--text3); margin-top: 3px; font-weight: 500; }
    .metric-trend { font-size: 0.68rem; font-weight: 700; margin-top: 4px; }
    .trend-up   { color: var(--green); }
    .trend-down { color: var(--red); }
    .trend-flat { color: var(--text3); }

    /* ══════════ CHARTS ROW — Image sparklines ══════════ */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }
    .chart-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 18px 18px 14px;
      box-shadow: var(--shadow-sm);
    }
    .cc-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2px; }
    .cc-title { font-size: 0.82rem; font-weight: 700; color: var(--text); }
    .cc-period {
      font-size: 0.65rem;
      color: var(--text3);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 8px;
      font-weight: 600;
    }
    .cc-val { font-size: 1.6rem; font-weight: 900; color: var(--text); line-height: 1; margin-bottom: 2px; }
    .cc-sub { font-size: 0.7rem; color: var(--text3); margin-bottom: 12px; }
    .sparkline-wrap { height: 70px; position: relative; }
    .chart-wrap-md { height: 190px; position: relative; }

    /* ══════════ MAIN BOTTOM GRID ══════════ */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }
    .bottom-grid .span2 { grid-column: span 2; }

    /* ══════════ UPLOAD ══════════ */
    .upload-zone {
      border: 2px dashed #b7e5c9;
      border-radius: 12px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--green-pale);
      position: relative;
    }
    .upload-zone:hover, .upload-zone.over {
      border-color: var(--green);
      background: var(--green-mid);
      box-shadow: 0 0 0 4px rgba(29,185,84,0.08);
    }
    .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .uz-icon { font-size: 2rem; margin-bottom: 6px; }
    .uz-text  { font-size: 0.82rem; color: var(--text2); line-height: 1.6; }
    .uz-text strong { color: var(--green-dark); }
    .preview-img { width: 100%; max-height: 160px; object-fit: cover; border-radius: 10px; margin-top: 10px; border: 2px solid #b7e5c9; }

    .btn-primary {
      width: 100%; margin-top: 12px; padding: 11px 16px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: #fff; border: none; border-radius: 10px;
      font-size: 0.88rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 3px 12px rgba(29,185,84,0.3);
      letter-spacing: 0.3px;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: var(--shadow-green); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
    .spinner { width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══════════ RESULT ══════════ */
    .result-idle { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 160px; color: var(--text3); gap: 6px; font-size: 0.8rem; text-align: center; }
    .result-card { border-radius: 12px; overflow: hidden; border: 1.5px solid var(--border); }
    .rc-header { padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
    .rc-header.healthy  { background: linear-gradient(135deg,#1db954,#0d6e2e); }
    .rc-header.sick     { background: linear-gradient(135deg,#f59e0b,#d97706); }
    .rc-header.critical { background: linear-gradient(135deg,#ef4444,#b91c1c); }
    .rc-header-name { font-size: 1rem; font-weight: 800; color: #fff; }
    .rc-body { padding: 14px 16px; background: #fff; }
    .rc-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.8rem; }
    .rc-lbl { color: var(--text3); font-weight: 500; }
    .rc-val { font-weight: 700; color: var(--text); }
    .prog { flex: 1; margin: 0 10px; height: 6px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 10px; transition: width 1s ease; }
    .pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
    .pill-healthy  { background: var(--green-pale); color: var(--green-dark); }
    .pill-sick     { background: #fef3c7; color: #92400e; }
    .pill-critical { background: #fee2e2; color: #991b1b; }
    .rc-advice { margin-top: 10px; background: var(--green-pale); border-left: 3px solid var(--green); border-radius: 0 8px 8px 0; padding: 9px 12px; font-size: 0.76rem; color: var(--green-deep); line-height: 1.5; }

    /* ══════════ ANNOTATIONS ══════════ */
    .note-modal-overlay {
      position: fixed; inset: 0; z-index: 10000;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    .note-modal {
      background: #fff; border-radius: 18px; width: 460px; max-width: 92vw;
      overflow: hidden; box-shadow: 0 24px 64px rgba(0,0,0,0.2);
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .note-modal-head {
      padding: 18px 22px 14px;
      border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .note-modal-title { font-size: 0.95rem; font-weight: 800; color: var(--text); }
    .note-modal-sub   { font-size: 0.73rem; color: var(--text3); margin-top: 2px; }
    .note-modal-close {
      width: 28px; height: 28px; border-radius: 8px; border: 1.5px solid var(--border);
      background: #fff; cursor: pointer; font-size: 0.9rem; color: var(--text2);
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .note-modal-close:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }
    .note-modal-body { padding: 18px 22px; }
    .note-disease-info {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
      background: var(--bg); border-radius: 10px; padding: 10px 14px;
    }
    .note-disease-icon { font-size: 1.3rem; }
    .note-disease-name { font-weight: 700; color: var(--text); font-size: 0.88rem; }
    .note-disease-date { font-size: 0.72rem; color: var(--text3); margin-top: 2px; }
    .note-textarea {
      width: 100%; min-height: 110px; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 0.85rem; font-family: 'Inter', sans-serif;
      color: var(--text); resize: vertical; transition: border-color 0.18s;
      outline: none; background: #fff;
    }
    .note-textarea:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,185,84,0.1); }
    .note-textarea::placeholder { color: var(--text3); }
    .note-char-count { text-align: right; font-size: 0.68rem; color: var(--text3); margin-top: 4px; }
    .note-actions { display: flex; gap: 10px; margin-top: 14px; }
    .note-btn-cancel {
      flex:1; padding: 10px; border-radius: 10px; border: 1.5px solid var(--border);
      background: #fff; color: var(--text2); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .note-btn-cancel:hover { background: var(--bg); }
    .note-btn-save {
      flex:1; padding: 10px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: #fff; font-size: 0.85rem; font-weight: 700; cursor: pointer;
      transition: all 0.18s; box-shadow: 0 2px 8px rgba(29,185,84,0.3);
    }
    .note-btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(29,185,84,0.4); }

    /* Note inline dans le tableau */
    .note-inline {
      font-size: 0.72rem; color: var(--text2); margin-top: 4px;
      background: #fef9c3; border-radius: 5px; padding: 3px 7px;
      border-left: 2px solid var(--orange); max-width: 200px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .btn-note {
      padding: 3px 9px; border-radius: 7px; border: 1.5px solid var(--border);
      background: #fff; color: var(--text3); font-size: 0.7rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-note:hover { background: var(--green-pale); border-color: var(--green); color: var(--green-dark); }
    .btn-note.has-note { background: #fef9c3; border-color: #f59e0b; color: #92400e; }

    /* ══════════ TABLE ══════════ */
    .tbl-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.79rem; }
    thead th { background: var(--bg); color: var(--text3); font-weight: 700; padding: 8px 12px; text-align: left; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 1.5px solid var(--border); }
    tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.12s; }
    tbody tr:hover { background: var(--green-pale); }
    tbody td { padding: 9px 12px; color: var(--text2); }
    .td-bold { color: var(--text); font-weight: 700; }

    /* ══════════ DISEASE LIST ══════════ */
    .dl-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #f1f5f9; }
    .dl-item:last-child { border-bottom: none; }
    .dl-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dl-name { flex: 1; font-size: 0.78rem; color: var(--text2); font-weight: 500; }
    .dl-bar-bg { width: 64px; height: 5px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .dl-bar    { height: 100%; border-radius: 4px; transition: width 0.7s; }
    .dl-cnt    { font-size: 0.76rem; font-weight: 800; color: var(--text); min-width: 16px; text-align: right; }

    /* ══════════ SENSOR BARS ══════════ */
    .sensor-row { margin-bottom: 14px; }
    .sensor-row:last-child { margin-bottom: 0; }
    .sensor-head { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .sensor-name { font-size: 0.76rem; color: var(--text2); font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .sensor-val  { font-size: 0.8rem; font-weight: 800; }
    .sensor-bar  { height: 7px; background: #f1f5f9; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
    .sensor-fill { height: 100%; border-radius: 10px; transition: width 0.9s ease; }

    /* ══════════ EMPTY ══════════ */
    .empty-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; color: var(--text3); text-align: center; }
    .empty-box .e-icon { font-size: 2.8rem; opacity: 0.35; margin-bottom: 10px; }
    .e-link { color: var(--green-dark); cursor: pointer; font-weight: 700; }

    /* ══════════ SECTION TITLE ══════════ */
    .section-title { font-size: 0.7rem; font-weight: 800; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

    @media (max-width: 1200px) { .charts-row { grid-template-columns: 1fr 1fr; } .hero-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 900px)  { .metrics-row { grid-template-columns: 1fr 1fr; } .bottom-grid { grid-template-columns: 1fr; } .bottom-grid .span2 { grid-column: 1; } }
    @media (max-width: 600px)  { .hero-grid { grid-template-columns: 1fr; } .page { padding: 12px; } .navbar { padding: 0 12px; } }

    /* ══════════ RESPONSIVE MOBILE COMPLET ══════════ */

    /* Hamburger button */
    .nav-hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 6px;
    }
    .nav-hamburger span {
      display: block; width: 22px; height: 2.5px; border-radius: 2px;
      background: var(--text2); transition: all 0.3s;
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

    /* Menu mobile drawer */
    .mobile-menu {
      display: none;
      position: fixed; top: 64px; left: 0; right: 0; z-index: 998;
      background: var(--white); border-bottom: 2px solid var(--border);
      box-shadow: var(--shadow-lg);
      padding: 12px 16px 16px;
      animation: slideDown 0.25s ease;
      flex-direction: column; gap: 6px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-tab {
      padding: 11px 16px; border-radius: 10px; border: none;
      background: none; font-size: 0.9rem; font-weight: 600;
      color: var(--text2); cursor: pointer; text-align: left;
      transition: all 0.15s; display: flex; align-items: center; gap: 10px;
    }
    .mobile-tab:hover  { background: var(--green-pale); color: var(--green-dark); }
    .mobile-tab.active { background: linear-gradient(135deg,var(--green),var(--green-dark)); color:#fff; }
    .mobile-menu-sep { height: 1px; background: var(--border); margin: 4px 0; }
    .mobile-menu-row { display: flex; gap: 8px; }
    .mobile-menu-row .mobile-tab { flex: 1; justify-content: center; }

    @media (max-width: 768px) {
      /* Cache les tabs desktop, montre le hamburger */
      .nav-tabs         { display: none !important; }
      .nav-badge        { display: none !important; }
      .nav-time         { display: none !important; }
      .btn-pdf          { display: none !important; }
      .btn-theme        { display: none !important; }
      .nav-profile-name, .nav-profile-role, .nav-chevron { display: none !important; }
      .nav-profile-btn  { padding: 4px; border-radius: 50%; }
      .nav-hamburger    { display: flex; }

      /* Page layout */
      .page { padding: 12px; }
      .hero-grid { grid-template-columns: 1fr !important; }
      .metrics-row { grid-template-columns: 1fr 1fr; }
      .charts-row  { grid-template-columns: 1fr !important; }
      .bottom-grid { grid-template-columns: 1fr !important; }
      .bottom-grid .span2 { grid-column: 1; }
      .stats-kpi-row { grid-template-columns: 1fr 1fr; }
      .stats-grid-top, .stats-grid-bot { grid-template-columns: 1fr !important; }

      /* Cartes héro : réduire padding */
      .hero-banner { padding: 18px 18px; }
      .hb-value    { font-size: 1.6rem; }
      .hb-conf-val { font-size: 2rem; }

      /* Navbar */
      .navbar { height: 56px; padding: 0 14px; gap: 10px; }
      .nav-logo { width: 30px; height: 30px; font-size: 0.9rem; }
      .nav-title { font-size: 0.7rem; }
      .nav-subtitle { display: none; }

      /* Profile dropdown — plein écran sur mobile */
      .profile-dropdown { left: 8px; right: 8px; width: auto; }

      /* Table scroll horizontal */
      .tbl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      table { min-width: 580px; }

      /* Charts hauteur réduite */
      .chart-wrap-md { height: 160px; }
      .sparkline-wrap { height: 55px; }

      /* Upload zone */
      .upload-zone { padding: 18px 12px; }

      /* Alert modal */
      .alert-modal { width: 95vw; }

      /* Stats KPI text */
      .stats-kpi-val { font-size: 1.7rem; }
    }

    @media (max-width: 420px) {
      .metrics-row  { grid-template-columns: 1fr; }
      .stats-kpi-row { grid-template-columns: 1fr; }
      .hb-value { font-size: 1.4rem; }
      .metric-val { font-size: 1.3rem; }
    }

    /* ══════════ SPLASH SCREEN ══════════ */
    .splash {
      position: fixed; inset: 0; z-index: 99999;
      background: linear-gradient(160deg, #0d6e2e 0%, #1db954 55%, #16a34a 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
    }
    .splash.fade-out {
      animation: splashFadeOut 0.7s ease forwards;
    }
    @keyframes splashFadeOut {
      from { opacity:1; transform: scale(1); }
      to   { opacity:0; transform: scale(1.04); }
    }

    /* Cercles décoratifs */
    .splash-circle {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      animation: splashPulse 3s ease-in-out infinite;
    }
    .splash-circle.c1 { width:500px; height:500px; top:-120px; right:-120px; animation-delay:0s; }
    .splash-circle.c2 { width:320px; height:320px; bottom:-80px; left:-80px; animation-delay:0.5s; }
    .splash-circle.c3 { width:200px; height:200px; top:60px; left:60px; animation-delay:1s; }
    @keyframes splashPulse {
      0%,100% { transform: scale(1); opacity:0.6; }
      50%      { transform: scale(1.08); opacity:1; }
    }

    /* Logo central */
    .splash-logo {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      animation: splashLogoIn 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes splashLogoIn {
      from { opacity:0; transform: scale(0.5) translateY(30px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }
    .splash-icon-wrap {
      width: 110px; height: 110px; border-radius: 28px;
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 3.8rem;
      box-shadow: 0 16px 48px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.3);
      animation: splashIconFloat 2s ease-in-out infinite 0.8s;
    }
    @keyframes splashIconFloat {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-10px) rotate(3deg); }
    }
    .splash-title {
      font-size: 2.8rem; font-weight: 900; color: #fff;
      letter-spacing: -1px; text-align: center;
      text-shadow: 0 4px 20px rgba(0,0,0,0.2);
      animation: splashTextIn 0.6s ease 0.3s both;
    }
    .splash-subtitle {
      font-size: 1rem; color: rgba(255,255,255,0.8); font-weight: 500;
      text-align: center; letter-spacing: 0.5px;
      animation: splashTextIn 0.6s ease 0.5s both;
    }
    @keyframes splashTextIn {
      from { opacity:0; transform: translateY(15px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* Barre de chargement */
    .splash-bar-wrap {
      position: relative; z-index: 1; margin-top: 40px;
      width: 220px;
      animation: splashTextIn 0.6s ease 0.7s both;
    }
    .splash-bar-track {
      height: 5px; background: rgba(255,255,255,0.2);
      border-radius: 10px; overflow: hidden;
    }
    .splash-bar-fill {
      height: 100%; border-radius: 10px;
      background: rgba(255,255,255,0.9);
      animation: splashBarGrow 2.2s cubic-bezier(0.4,0,0.2,1) 0.3s forwards;
      width: 0%;
    }
    @keyframes splashBarGrow {
      0%   { width:0%; }
      40%  { width:55%; }
      70%  { width:80%; }
      90%  { width:95%; }
      100% { width:100%; }
    }
    .splash-status {
      margin-top: 10px; font-size: 0.75rem; color: rgba(255,255,255,0.65);
      text-align: center; font-weight: 500; height: 18px;
      animation: splashTextIn 0.6s ease 0.7s both;
    }

    /* Tags techno en bas */
    .splash-tags {
      position: relative; z-index: 1; margin-top: 32px;
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
      animation: splashTextIn 0.6s ease 0.9s both;
    }
    .splash-tag {
      padding: 5px 14px; border-radius: 20px;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
      font-size: 0.72rem; font-weight: 700; color: #fff;
      letter-spacing: 0.5px;
    }

    /* ══════════ TILT 3D CARDS ══════════ */
    .tilt-wrap {
      transform-style: preserve-3d;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      will-change: transform;
      position: relative;
    }
    .tilt-wrap:hover { z-index: 10; }
    .tilt-glare {
      position: absolute; inset: 0; border-radius: inherit;
      pointer-events: none; overflow: hidden; z-index: 2;
      border-radius: 18px;
    }
    .tilt-glare::after {
      content: '';
      position: absolute; inset: -50%;
      background: radial-gradient(circle at var(--mx,50%) var(--my,50%),
        rgba(255,255,255,0.18) 0%,
        rgba(255,255,255,0.06) 35%,
        transparent 65%);
      transition: opacity 0.3s;
      opacity: 0;
    }
    .tilt-wrap:hover .tilt-glare::after { opacity: 1; }

    /* ══════════ DARK MODE OVERRIDES ══════════ */
    body.dark thead th        { background: #13161f; color: var(--text3); border-bottom-color: var(--border); }
    body.dark tbody tr:hover  { background: #1a1d27; }
    body.dark tbody tr        { border-bottom-color: var(--border); }
    body.dark .upload-zone    { background: #13161f; border-color: #2a3a2e; }
    body.dark .upload-zone:hover, body.dark .upload-zone.over { background: #0d2e1a; border-color: var(--green); }
    body.dark .login-input    { background: #13161f; color: var(--text); border-color: var(--border); }
    body.dark .login-input:focus { border-color: var(--green); }
    body.dark .note-textarea  { background: #13161f; color: var(--text); border-color: var(--border); }
    body.dark .alert-modal    { background: #1a1d27; }
    body.dark .alert-body     { background: #1a1d27; }
    body.dark .alert-btn-dismiss { background: #13161f; border-color: var(--border); color: var(--text2); }
    body.dark .note-modal     { background: #1a1d27; }
    body.dark .note-modal-head{ border-bottom-color: var(--border); }
    body.dark .note-disease-info { background: #13161f; }
    body.dark .note-btn-cancel { background: #13161f; border-color: var(--border); color: var(--text2); }
    body.dark .rc-body        { background: #1a1d27; }
    body.dark .result-card    { border-color: var(--border); }
    body.dark .prog           { background: #2a2d3a; }
    body.dark .sensor-bar     { background: #2a2d3a; border-color: var(--border); }
    body.dark .dl-bar-bg      { background: #2a2d3a; }
    body.dark .cc-period      { background: #13161f; border-color: var(--border); }
    body.dark .nav-tab:hover  { background: #0d2e1a; }
    body.dark .alert-bar-close { background: rgba(255,255,255,0.15); }
    body.dark .note-inline    { background: #2a2010; border-left-color: var(--orange); }
    body.dark .btn-note       { background: #13161f; border-color: var(--border); color: var(--text3); }
    body.dark .btn-note.has-note { background: #2a2010; border-color: #92400e; color: #fbbf24; }
    body.dark .rc-advice      { background: #0d2e1a; border-left-color: var(--green); color: #6ee7a0; }
    body.dark .login-hint     { background: #0d2e1a; border-color: #1a4a2a; color: #6ee7a0; }
    body.dark .login-remember { color: var(--text2); }
    body.dark .login-footer   { color: var(--text3); }
    body.dark .login-logo-text h1 { color: var(--text); }
    body.dark .login-sub, body.dark .login-title { color: var(--text); }

    /* ══════════ STATISTIQUES ══════════ */
    .stats-kpi-row {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 20px;
    }
    .stats-kpi {
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 16px; padding: 20px 22px;
      box-shadow: var(--shadow-sm); transition: all 0.2s; position: relative; overflow: hidden;
    }
    .stats-kpi:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .stats-kpi-accent { position: absolute; top:0; left:0; right:0; height:4px; border-radius: 16px 16px 0 0; }
    .stats-kpi-icon { font-size: 1.6rem; margin-bottom: 10px; }
    .stats-kpi-val  { font-size: 2.2rem; font-weight: 900; line-height: 1; color: var(--text); }
    .stats-kpi-label{ font-size: 0.72rem; color: var(--text3); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
    .stats-kpi-sub  { font-size: 0.72rem; font-weight: 700; margin-top: 8px; }

    .stats-grid-top {
      display: grid; grid-template-columns: 1.4fr 1fr; gap: 14px; margin-bottom: 14px;
    }
    .stats-grid-bot {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 20px;
    }

    /* Barre de maladie dans le classement */
    .disease-rank-item {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .disease-rank-item:last-child { border-bottom: none; }
    .rank-num {
      width: 22px; height: 22px; border-radius: 7px;
      background: var(--bg); color: var(--text3);
      font-size: 0.68rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .rank-num.top { background: linear-gradient(135deg,#f59e0b,#d97706); color:#fff; }
    .rank-name { flex:1; font-size: 0.8rem; font-weight: 600; color: var(--text); }
    .rank-bar-bg { width: 80px; height: 6px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .rank-bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
    .rank-count { font-size: 0.78rem; font-weight: 800; min-width: 28px; text-align: right; }

    /* Indicateur de santé global */
    .health-score-wrap {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px 0; gap: 6px;
    }
    .health-score-val { font-size: 3.5rem; font-weight: 900; line-height: 1; }
    .health-score-label { font-size: 0.78rem; color: var(--text3); font-weight: 600; }
    .health-score-ring {
      width: 120px; height: 120px; position: relative; margin: 10px 0;
    }
    .health-score-ring svg { transform: rotate(-90deg); }
    .ring-bg   { fill: none; stroke: var(--border); stroke-width: 10; }
    .ring-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }

    .stats-tip {
      background: var(--green-pale); border: 1px solid #a7f3c3; border-radius: 10px;
      padding: 12px 16px; font-size: 0.78rem; color: var(--green-deep); line-height: 1.6;
      display: flex; align-items: flex-start; gap: 10px; margin-top: 14px;
    }
    body.dark .stats-tip { background: #0d2e1a; border-color: #1a4a2a; color: #6ee7a0; }

    @media (max-width: 900px) {
      .stats-kpi-row { grid-template-columns: 1fr 1fr; }
      .stats-grid-top, .stats-grid-bot { grid-template-columns: 1fr; }
    }

    /* ══════════ PROFIL UTILISATEUR ══════════ */
    .nav-profile {
      position: relative;
    }
    .nav-profile-btn {
      display: flex; align-items: center; gap: 9px;
      padding: 5px 12px 5px 6px;
      border: 1.5px solid var(--border); border-radius: 24px;
      background: var(--white); cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }

/* Convertit la réponse brute du backend YOLOv8 → format frontend */
function transformBackendResponse(raw) {
  // Pas de détection
  if (!raw.predictions || raw.predictions.length === 0) {
    return { maladie:"Aucune maladie détectée", niveau:"healthy", score:95, conseil:"Le modèle n'a détecté aucune pathologie. Plante probablement saine." };
  }
  // Prendre la prédiction avec la meilleure confiance
  const best = raw.predictions.reduce((a,b) => a.confidence > b.confidence ? a : b);
  const score = Math.round(best.confidence * 100);
  const mapped = CLASS_MAP[best.class];
  if (mapped) {
    return { ...mapped, score };
  }
  // Classe inconnue — fallback générique basé sur la confiance
  const niveau = score >= 85 ? "critical" : score >= 55 ? "sick" : "healthy";
  return {
    maladie: `Maladie détectée (classe ${best.class})`,
    niveau,
    score,
    conseil: "Consulter un agronome pour identification précise."
  };
}

/* ── Sensor simulation ── */
function useSensors() {
  const init = {temp:24.3,humidity:62,soil:65,light:74};
  const [s, setS] = useState(init);
  const [hist, setHist] = useState({labels:[],temp:[],hum:[],soil:[]});
  useEffect(()=>{
    const id = setInterval(()=>{
      setS(p=>({
        temp:    +(Math.min(40,Math.max(10, p.temp    +(Math.random()-.5)*.5))).toFixed(1),
        humidity: Math.min(95,Math.max(20, Math.round(p.humidity+(Math.random()-.5)*2))),
        soil:     Math.min(95,Math.max(20, Math.round(p.soil    +(Math.random()-.5)*1.5))),
        light:    Math.min(100,Math.max(20,Math.round(p.light   +(Math.random()-.5)*2))),
      }));
    },2500);
    return ()=>clearInterval(id);
  },[]);
  useEffect(()=>{
    setHist(p=>{
      const t = new Date();
      const lbl = [...p.labels, fmtTime(t)].slice(-12);
      return { labels:lbl, temp:[...p.temp,s.temp].slice(-12), hum:[...p.hum,s.humidity].slice(-12), soil:[...p.soil,s.soil].slice(-12) };
    });
  },[s]);
  return {s, hist};
}

/* ── TiltCard — effet 3D au survol ── */
function TiltCard({ children, className, style, maxTilt }) {
  maxTilt = maxTilt || 15;
  var ref = React.useRef();
  function onMouseMove(e) {
    var el = ref.current;
    if (!el) return;
    var rect = el.getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    var dx = (e.clientX - cx) / (rect.width / 2);
    var dy = (e.clientY - cy) / (rect.height / 2);
    var rotX = (-dy * maxTilt).toFixed(2);
    var rotY = (dx * maxTilt).toFixed(2);
    var mx = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
    var my = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
    el.style.transform = "perspective(800px) rotateX("+rotX+"deg) rotateY("+rotY+"deg) scale3d(1.04,1.04,1.04)";
    el.style.boxShadow = "0 24px 60px rgba(0,0,0,0.25)";
    var glare = el.querySelector('.tilt-glare');
    if (glare) {
      glare.style.setProperty('--mx', mx + '%');
      glare.style.setProperty('--my', my + '%');
    }
  }
  function onMouseLeave() {
    var el = ref.current;
    if (!el) return;
    el.style.transform = '';
    el.style.boxShadow = '';
  }
  return React.createElement(
    'div',
    { ref: ref, className: 'tilt-wrap ' + (className || ''), style: style,
      onMouseMove: onMouseMove, onMouseLeave: onMouseLeave },
    React.createElement('div', { className: 'tilt-glare' }),
    children
  );
}

/* ── Sparkline ── */
function Sparkline({ data, color, fill }) {
  const r=useRef(); const c=useRef();
  useEffect(()=>{
    c.current?.destroy();
    if (!data.length) return;
    const ctx = r.current.getContext("2d");
    const grad = ctx.createLinearGradient(0,0,0,70);
    grad.addColorStop(0, color+"44");
    grad.addColorStop(1, color+"00");
    c.current = new Chart(ctx,{
      type:"line",
      data:{labels:data.map((_,i)=>""),datasets:[{data,borderColor:color,backgroundColor:fill?grad:"transparent",borderWidth:2,pointRadius:0,tension:0.5,fill:fill}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}},animation:{duration:400}}
    });
    return ()=>c.current?.destroy();
  },[JSON.stringify(data)]);
  return <canvas ref={r}/>;
}

/* ══════════════ CURSOR TRAIL ══════════════ */
function CursorTrail() {
  useEffect(() => {
    var canvas = document.createElement('canvas');
    canvas.id = 'cursor-canvas';
    canvas.style.cssText = 'position:fixed;inset:0;z-index:999999;pointer-events:none';
    document.body.appendChild(canvas);
    var ctx = canvas.getContext('2d');
    var W, H;
    var resize = function() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
    resize(); window.addEventListener('resize', resize);
    var particles = [], mx = -300, my = -300, frame = 0;
    window.addEventListener('mousemove', function(e){ mx=e.clientX; my=e.clientY; });
    var animId;
    function loop() {
      animId = requestAnimationFrame(loop);
      ctx.clearRect(0,0,W,H);
      frame++;
      if (frame%2===0 && mx>0) {
        particles.push({
          x:mx+(Math.random()-.5)*6, y:my+(Math.random()-.5)*6,
          vx:(Math.random()-.5)*2, vy:(Math.random()-.5)*2-1,
          life:1, size:Math.random()*3+1.5, hue:110+Math.random()*50
        });
      }
      for (var i=particles.length-1; i>=0; i--) {
        var p=particles[i];
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.06; p.vx*=0.96; p.life-=0.05;
        if(p.life<=0){particles.splice(i,1);continue;}
        ctx.save();
        ctx.globalAlpha=p.life*0.7;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
        ctx.fillStyle='hsl('+p.hue+',85%,55%)';
        ctx.shadowColor='hsl('+p.hue+',85%,55%)'; ctx.shadowBlur=8;
        ctx.fill(); ctx.restore();
      }
    }
    loop();
    return function(){ cancelAnimationFrame(animId); window.removeEventListener('resize',resize); if(canvas.parentNode)canvas.remove(); };
  }, []);
  return null;
}

/* ══════════════ CONFETTI ══════════════ */
function triggerConfetti(ox, oy) {
  var canvas = document.getElementById('confetti-canvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id='confetti-canvas';
    canvas.style.cssText='position:fixed;inset:0;z-index:999998;pointer-events:none';
    document.body.appendChild(canvas);
  }
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  var ctx=canvas.getContext('2d');
  var cx=ox||canvas.width/2, cy=oy||canvas.height*0.38;
  var colors=['#1db954','#4ade80','#a7f3d0','#fbbf24','#34d399','#6ee7b7','#f9a8d4','#93c5fd','#c4b5fd'];
  var pieces=[];
  for(var i=0;i<110;i++){
    var ang=(Math.random()*340-170)*Math.PI/180;
    var spd=Math.random()*12+4;
    pieces.push({
      x:cx,y:cy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-3,
      w:Math.random()*10+4,h:Math.random()*5+2,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*360,rotSpd:(Math.random()-.5)*9,
      life:1,grav:0.14+Math.random()*0.08,
      shape:Math.random()>.6?'circle':'rect'
    });
  }
  var animId;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    var any=false;
    pieces.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.vx*=0.99;
      p.rot+=p.rotSpd;p.life-=0.015;
      if(p.life<=0||p.y>canvas.height)return;
      any=true;
      ctx.save();ctx.globalAlpha=Math.min(1,p.life*1.4);
      ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=4;
      ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.w/2,0,Math.PI*2);ctx.fill();}
      else{ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);}
      ctx.restore();
    });
    if(any)animId=requestAnimationFrame(draw);
    else{cancelAnimationFrame(animId);ctx.clearRect(0,0,canvas.width,canvas.height);}
  }
  draw();
}

/* ══════════════ ANIMATED NUMBER ══════════════ */
function AnimatedNumber({ value, suffix, prefix, decimals, color }) {
  var numVal = Number(value);
  var [disp, setDisp] = useState(numVal);
  var prev = useRef(numVal);
  useEffect(function(){
    var from=Number(prev.current), to=Number(value);
    prev.current=value;
    if(from===to)return;
    var dur=650, start=performance.now(), id;
    function step(now){
      var t=Math.min((now-start)/dur,1);
      var ease=1-Math.pow(1-t,3);
      var v=from+(to-from)*ease;
      setDisp(decimals!=null?v.toFixed(decimals):Math.round(v));
      if(t<1)id=requestAnimationFrame(step);
    }
    id=requestAnimationFrame(step);
    return function(){cancelAnimationFrame(id);};
  },[value]);
  return React.createElement('span',{className:'anim-num',style:color?{color}:{}},
    (prefix||'')+disp+(suffix||'')
  );
}

/* ══════════════ ARC GAUGE ══════════════ */
function ArcGauge({ value, color, size }) {
  size = size||112;
  var stroke=9, r=(size-stroke*2)/2, cx=size/2, cy=size/2;
  function pTC(deg){ var rad=(deg-90)*Math.PI/180; return {x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)}; }
  function arc(s,e){ var sp=pTC(s),ep=pTC(e),lg=e-s>180?1:0; return 'M '+sp.x+' '+sp.y+' A '+r+' '+r+' 0 '+lg+' 1 '+ep.x+' '+ep.y; }
  var bgPath=arc(135,405);
  var fgPath=arc(135, 135+Math.min(value/100,1)*270);
  var c=color||'#1db954';
  return (
    <div className="arc-gauge-wrap" style={{width:size,height:size*0.76}}>
      <svg width={size} height={size} viewBox={'0 0 '+size+' '+size} style={{position:"absolute",top:0,left:0}}>
        <path d={bgPath} fill="none" stroke="rgba(148,163,184,0.2)" strokeWidth={stroke} strokeLinecap="round"/>
        <path d={fgPath} fill="none" stroke={c} strokeWidth={stroke} strokeLinecap="round"
          style={{filter:'drop-shadow(0 0 6px '+c+'88)',transition:'all 1.2s cubic-bezier(0.34,1.56,0.64,1)'}}/>
      </svg>
      <div className="arc-gauge-center">
        <div className="arc-gauge-val" style={{color:c}}>{value}<span style={{fontSize:"0.5em",fontWeight:700}}>%</span></div>
        <div className="arc-gauge-lbl">Confidence</div>
      </div>
    </div>
  );
}

/* ══════════════ COMMAND PALETTE ══════════════ */
function CommandPalette({ onClose, onNavigate, history, darkMode, onToggleDark }) {
  var [q,setQ]=useState(""), [sel,setSel]=useState(0);
  var inputRef=useRef();
  useEffect(function(){ inputRef.current&&inputRef.current.focus(); },[]);

  var BASE=[
    {icon:"📊",name:"Dashboard",        desc:"Vue principale",          action:function(){onNavigate("dashboard");onClose();}},
    {icon:"🔍",name:"Analyser",          desc:"Analyser une plante",     action:function(){onNavigate("analyse");onClose();}},
    {icon:"🗂️",name:"Historique",        desc:"Toutes les analyses",     action:function(){onNavigate("history");onClose();}},
    {icon:"📈",name:"Statistiques",      desc:"Graphiques & tendances",  action:function(){onNavigate("stats");onClose();}},
    {icon:darkMode?"☀️":"🌙",name:"Basculer le thème", desc:darkMode?"→ Mode clair":"→ Mode sombre", action:function(){onToggleDark();onClose();}},
    {icon:"📄",name:"Exporter PDF",      desc:"Rapport complet",         action:function(){onClose();}},
  ];
  var HIST=(history||[]).slice(0,4).map(function(h){return {
    icon:h.niveau==="healthy"?"🟢":h.niveau==="critical"?"🔴":"🟡",
    name:h.maladie, desc:h.score+"% · "+(h.image||"image"),
    action:function(){onNavigate("history");onClose();}
  };});

  var filtered=q?[...BASE,...HIST].filter(function(c){
    return c.name.toLowerCase().includes(q.toLowerCase())||c.desc.toLowerCase().includes(q.toLowerCase());
  }):BASE;

  var sections=q?[{lbl:"Résultats",items:filtered}]:[
    ...(HIST.length?[{lbl:"Analyses récentes",items:HIST}]:[]),
    {lbl:"Actions",items:BASE}
  ];
  var allItems=sections.reduce(function(a,s){return a.concat(s.items);},[]);

  var handleKey=function(e){
    if(e.key==='Escape'){onClose();return;}
    if(e.key==='ArrowDown'){e.preventDefault();setSel(function(s){return Math.min(s+1,allItems.length-1);});}
    if(e.key==='ArrowUp'){e.preventDefault();setSel(function(s){return Math.max(s-1,0);});}
    if(e.key==='Enter'){e.preventDefault();if(allItems[sel])allItems[sel].action();}
  };

  var gIdx=0;
  return (
    <div className="cmd-overlay" onClick={onClose}>
      <div className="cmd-box" onClick={function(e){e.stopPropagation();}}>
        <div className="cmd-input-row">
          <span className="cmd-search-icon">⌕</span>
          <input ref={inputRef} className="cmd-input"
            placeholder="Rechercher une page, action, analyse…"
            value={q} onChange={function(e){setQ(e.target.value);setSel(0);}}

/* ══════════════ LIVE TICKER (hook) ══════════════ */
function useTicker(result) {
  var base=["ESP32-CAM · Online","YOLOv8 · Chargé","Accuracy · 94.7%","Flask API · Prête","MongoDB · OK"];
  var msgs=result?["Dernier: "+result.maladie.slice(0,22),"Conf: "+result.score+"%"].concat(base):base;
  var [idx,setIdx]=useState(0), [tick,setTick]=useState(0);
  useEffect(function(){
    var id=setInterval(function(){setIdx(function(i){return(i+1)%msgs.length;});setTick(function(t){return t+1;});},3000);
    return function(){clearInterval(id);};
  },[msgs.length]);
  return {msg:msgs[idx],tick};
}

/* ══════════════ SCROLL REVEAL (hook) ══════════════ */
function useScrollReveal(page) {
  useEffect(function(){
    var els=document.querySelectorAll('.reveal');
    if(!els.length)return;
    if(!('IntersectionObserver' in window)){
      els.forEach(function(el){el.classList.add('visible');});return;
    }
    var obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting)e.target.classList.add('visible');});
    },{threshold:0.08,rootMargin:'0px 0px -20px 0px'});
    els.forEach(function(el){obs.observe(el);});
    return function(){obs.disconnect();};
  },[page]);
}

/* ══════════════ SPLASH SCREEN ══════════════ */
function SplashScreen({ onDone }) {
  const [fading, setFading] = useState(false);
  const [status, setStatus] = useState("Initialisation du système…");
  const canvasRef = useRef();
  const rendererRef = useRef();

  const STEPS = [
    { t: 400,  msg: "Connexion à l'ESP32-CAM…" },
    { t: 900,  msg: "Chargement du modèle YOLOv8…" },
    { t: 1500, msg: "Lecture des capteurs IoT…" },
    { t: 2100, msg: "Prêt ✓" },
  ];

  /* ── Three.js 3D sphere ── */
  useEffect(() => {
    const THREE = window.THREE;
    if (!THREE || !canvasRef.current) return;
    const canvas = canvasRef.current;
    const W = canvas.offsetWidth || window.innerWidth;
    const H = canvas.offsetHeight || window.innerHeight;

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    rendererRef.current = renderer;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 100);
    camera.position.z = 3.2;

    /* Fibonacci sphere — distribution uniforme des particules */
    const N = 280;
    const positions = [];
    const pts = [];
    const goldenAngle = Math.PI * (3 - Math.sqrt(5));
    for (let i = 0; i < N; i++) {
      const y = 1 - (i / (N - 1)) * 2;
      const r = Math.sqrt(1 - y * y);
      const theta = goldenAngle * i;
      const x = Math.cos(theta) * r;
      const z = Math.sin(theta) * r;
      positions.push(x, y, z);
      pts.push({ x, y, z });
    }

    /* Points verts lumineux */
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    const mat = new THREE.PointsMaterial({
      color: 0x1db954, size: 0.045,
      transparent: true, opacity: 0.95,
      sizeAttenuation: true,
    });
    const sphere = new THREE.Points(geo, mat);
    scene.add(sphere);

    /* Lignes entre particules proches — réseau neuronal */
    const linePos = [];
    const threshold = 0.38;
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[i].x - pts[j].x;
        const dy = pts[i].y - pts[j].y;
        const dz = pts[i].z - pts[j].z;
        if (Math.sqrt(dx*dx + dy*dy + dz*dz) < threshold) {
          linePos.push(pts[i].x, pts[i].y, pts[i].z, pts[j].x, pts[j].y, pts[j].z);
        }
      }
    }
    const lineGeo = new THREE.BufferGeometry();
    lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePos, 3));
    const lineMat = new THREE.LineBasicMaterial({ color: 0x4ade80, transparent: true, opacity: 0.18 });
    const lines = new THREE.LineSegments(lineGeo, lineMat);
    scene.add(lines);

    /* Halo lumineux central */
    const glowGeo = new THREE.SphereGeometry(0.92, 32, 32);
    const glowMat = new THREE.MeshBasicMaterial({
      color: 0x1db954, transparent: true, opacity: 0.04, side: THREE.BackSide,
    });
    scene.add(new THREE.Mesh(glowGeo, glowMat));

    /* Deuxième sphère de points plus petits — profondeur */
    const N2 = 120;
    const pos2 = [];
    for (let i = 0; i < N2; i++) {
      const y = 1 - (i / (N2 - 1)) * 2;
      const r = Math.sqrt(1 - y * y) * 1.45;
      const theta = goldenAngle * i * 1.3;
      pos2.push(Math.cos(theta)*r, y*1.45, Math.sin(theta)*r);
    }
    const geo2 = new THREE.BufferGeometry();
    geo2.setAttribute('position', new THREE.Float32BufferAttribute(pos2, 3));
    const mat2 = new THREE.PointsMaterial({ color: 0xa7f3d0, size: 0.022, transparent: true, opacity: 0.5 });
    scene.add(new THREE.Points(geo2, mat2));

    /* Animation loop */
    let frame; let t = 0;
    const animate = () => {
      frame = requestAnimationFrame(animate);
      t += 0.008;
      sphere.rotation.y = t * 0.55;
      sphere.rotation.x = Math.sin(t * 0.3) * 0.25;
      lines.rotation.y  = t * 0.55;
      lines.rotation.x  = Math.sin(t * 0.3) * 0.25;
      /* Pulsation de taille */
      mat.size = 0.045 + Math.sin(t * 1.8) * 0.008;
      mat.opacity = 0.85 + Math.sin(t * 2.1) * 0.12;
      renderer.render(scene, camera);
    };
    animate();

    return () => {
      cancelAnimationFrame(frame);
      renderer.dispose();
      geo.dispose(); mat.dispose();
      lineGeo.dispose(); lineMat.dispose();
    };
  }, []);

  /* ── Timers splash ── */
  useEffect(() => {
    const timers = STEPS.map(s => setTimeout(() => setStatus(s.msg), s.t));
    const fadeTimer = setTimeout(() => setFading(true), 3200);
    const doneTimer = setTimeout(() => onDone(), 3900);
    return () => { timers.forEach(clearTimeout); clearTimeout(fadeTimer); clearTimeout(doneTimer); };
  }, []);

  return (
    <div className={`splash ${fading ? "fade-out" : ""}`}>
      {/* Canvas Three.js en arrière-plan */}
      <canvas ref={canvasRef} style={{
        position:"absolute", inset:0, width:"100%", height:"100%", zIndex:0, pointerEvents:"none"
      }}/>

      {/* Cercles décoratifs flous */}
      <div className="splash-circle c1"/>
      <div className="splash-circle c2"/>
      <div className="splash-circle c3"/>

      {/* Logo + titre */}
      <div className="splash-logo" style={{position:"relative",zIndex:2}}>
        <div className="splash-icon-wrap">🌿</div>
        <div className="splash-title">PlantAI</div>
        <div className="splash-subtitle">Détection intelligente des maladies des plantes</div>
      </div>

      {/* Barre de progression */}
      <div className="splash-bar-wrap" style={{position:"relative",zIndex:2}}>
        <div className="splash-bar-track">
          <div className="splash-bar-fill"/>
        </div>
        <div className="splash-status">{status}</div>
      </div>

      {/* Tags technos */}
      <div className="splash-tags" style={{position:"relative",zIndex:2}}>
        <span className="splash-tag">📡 ESP32-CAM</span>
        <span className="splash-tag">🤖 YOLOv8</span>
        <span className="splash-tag">🐍 Flask</span>
        <span className="splash-tag">🍃 MongoDB</span>
        <span className="splash-tag">⚛️ React</span>
        <span className="splash-tag">🔵 Three.js</span>
      </div>
    </div>
  );
}
